services:
  db:
    image: postgres:15-alpine
    container_name: data-explorer-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=data_explorer
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: data-explorer-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: data-explorer-backend
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/data_explorer
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001/api
    container_name: data-explorer-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
  redisdata:

networks:
  default:
    name: data-explorer-network
