# ──────────────────────────────────────────────
# Data Explorer – Nginx Configuration
# SPA routing, gzip, security headers, caching
# ──────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ── Gzip Compression ─────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ── Security Headers ─────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http://localhost:3001 https:; frame-ancestors 'self';" always;

    # ── Static Asset Caching ─────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Fallback ─────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable logging for health checks ────
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ── Disable access to hidden files ───────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
